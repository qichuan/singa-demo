<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SINGA — Legend of the Lion City</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <style>
      :root {
        --ink: #16202a;
        --gold: #f2c14e;
        --gold-dark: #b9892f;
        --kris: #6fe3d2;
        --aqua: #67c7bf;
        --font-pixel: "Press Start 2P", "Trebuchet MS", monospace;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0c1018; }
      body {
        font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
        color: #f5f1e6;
        -webkit-user-select: none;
        user-select: none;
      }
      #app { position: fixed; inset: 0; }
      canvas { display: block; width: 100%; height: 100%; }

      /* UI overlay layer (HUD, dialogue, menus mount here) */
      #ui { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
      #ui > * { pointer-events: auto; }

      /* Shared chunky gold "pill" button with a thick dark outline + 3D stacked edge. */
      .btn-gold {
        font-family: var(--font-pixel);
        font-size: clamp(0.6rem, 1.8vw, 0.85rem);
        color: var(--ink);
        background: var(--gold);
        border: 3px solid var(--ink);
        border-radius: 12px;
        padding: 0.9em 1.6em;
        cursor: pointer;
        line-height: 1.4;
        box-shadow: 0 5px 0 var(--gold-dark), 0 9px 0 var(--ink);
        transition: transform 0.06s ease, box-shadow 0.06s ease;
      }
      .btn-gold:hover { filter: brightness(1.05); }
      .btn-gold:active { transform: translateY(5px); box-shadow: 0 0 0 var(--gold-dark), 0 4px 0 var(--ink); }

      /* Boot / title screen — aqua void to match the world. */
      #boot {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 1.6rem;
        background: radial-gradient(circle at 50% 40%, #7ad2cb 0%, var(--aqua) 55%, #3f9e97 100%);
        z-index: 100; transition: opacity 0.6s ease;
      }
      #boot h1 {
        font-family: var(--font-pixel);
        font-size: clamp(1.6rem, 7vw, 4.2rem);
        letter-spacing: 0.06em; color: #f7f3e7; line-height: 1.2;
        text-shadow: 4px 4px 0 var(--ink), 7px 7px 0 rgba(22,32,42,0.35);
      }
      #boot p {
        font-family: var(--font-pixel); font-size: clamp(0.5rem, 1.4vw, 0.75rem);
        color: var(--ink); opacity: 0.8; letter-spacing: 0.04em;
      }
      #begin-btn { margin-top: 0.6rem; }
      #boot .hint { font-size: 0.8rem; color: var(--ink); opacity: 0.6; }
      #boot.hidden { opacity: 0; pointer-events: none; }
    </style>
    <script type="module" crossorigin src="./assets/index-CdJ6VbzY.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <div id="ui"></div>
    <div id="boot">
      <h1>SINGA</h1>
      <p>LEGEND OF THE LION CITY</p>
      <button id="begin-btn" class="btn-gold">BEGIN</button>
      <div class="hint">tap / press any key</div>
    </div>
  </body>
</html>
